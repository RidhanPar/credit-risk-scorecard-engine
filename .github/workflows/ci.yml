name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q --tb=short

      - name: Check import health
        run: |
          python -c "from src.data_loader import run_data_pipeline"
          python -c "from src.feature_engineering import fit_binning_process"
          python -c "from src.scorecard import score_applicant, get_score_tier"
          python -c "from src.evaluation import gini_coefficient, ks_statistic"
          python -c "from src.monitoring import calculate_psi"
